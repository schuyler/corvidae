[project]
name = "corvidae"
version = "0.0.1"
requires-python = ">=3.13"
dependencies = [
    "aiohttp>=3.9",
    "aiosqlite>=0.19",
    "apluggy>=1.1.2",
    "mcp>=1.0",
    "pydle>=0.9",
    "pydantic>=2.13.3",
    "pyyaml>=6.0.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
]

[project.scripts]
corvidae = "corvidae.main:cli"

[tool.setuptools.packages.find]
include = ["corvidae*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
